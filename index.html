<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Arène - 1v1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="home-container" class="menu-box">
    <img src="logo-duel.png" alt="Le Duel" class="main-logo">
    <div class="action-buttons">
        <button id="btn-create-room">CRÉER UNE PARTIE PRIVÉE</button>
        <div class="join-box">
            <input type="text" id="input-room-code" placeholder="Code de la partie" maxlength="4">
            <button id="btn-join-room">REJOINDRE</button>
        </div>
    </div>
</div>

<div id="lobby-container" class="menu-box" style="display: none;">
    <img src="logo-duel.png" alt="Le Duel" class="game-logo">
    <h2>Code de la partie : <span id="display-room-code" class="highlight">----</span></h2>
    <p>Joueurs dans le salon : <span id="room-player-count">1</span>/2</p>

    <div id="host-settings">
        <h3>Paramètres de la partie</h3>
        <label>Thème :</label>
        <select id="select-theme">
            <option value="athletes">Athlètes Français</option>
            <option value="stades">Stades de Foot</option>
            <option value="logos">Logos de Clubs</option>
        </select>

        <label>Temps par joueur :</label>
        <select id="select-timer">
            <option value="30">30 secondes (Rapide)</option>
            <option value="45" selected>45 secondes (Classique)</option>
            <option value="60">60 secondes (Long)</option>
        </select>

        <button id="btn-start-custom" disabled>LANCER LE DUEL (Attente du joueur 2...)</button>
    </div>

    <div id="guest-waiting" style="display: none;">
        <p>En attente que l'hôte configure et lance la partie...</p>
    </div>
</div>

    <div id="game-container" style="display: none;">
        <img src="logo_duel.png" alt="Le Duel" class="game-logo">
        
        <div id="display-area">
            </div>

        <p class="hint-text">
            Les accents ne sont pas nécessaires<br>
            Tapez uniquement les noms de famille des sportifs !
        </p>

        <div id="input-area">
            <input type="text" id="answer-input" placeholder="Tape ta réponse ici..." autocomplete="off">
            <button id="pass-btn">PASSER (-3s)</button>
        </div>

        <div id="scoreboard">
            <div class="player">Toi: <span id="my-time">45</span>s</div>
            <div class="player">Adversaire: <span id="opponent-time">45</span>s</div>
        </div>

        <div id="game-over-screen" style="display: none;">
            <h2 id="winner-message">VICTOIRE !</h2>
            <p>Le temps est écoulé.</p>
            <button id="restart-btn" onclick="location.reload()">REJOUER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
